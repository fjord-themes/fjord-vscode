name: Publish VS Code Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --baseContentUrl https://raw.githubusercontent.com/fjord-themes/fjord-vscode/main --baseImagesUrl https://raw.githubusercontent.com/fjord-themes/fjord-vscode/main

      - name: Create GitHub release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Version: ${VERSION}"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Released via fjord-core deploy pipeline." \
            || true

          gh release upload "v${VERSION}" "fjord-theme-${VERSION}.vsix" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to marketplace
        run: vsce publish --no-git-tag-version --baseContentUrl https://raw.githubusercontent.com/fjord-themes/fjord-vscode/main --baseImagesUrl https://raw.githubusercontent.com/fjord-themes/fjord-vscode/main
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
